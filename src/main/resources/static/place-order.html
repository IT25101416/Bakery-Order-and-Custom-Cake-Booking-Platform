<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order – Elegant Bakery</title>
    <meta name="description" content="Place your cake order at Elegant Luxury Bakery.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Auth guard -->
<script src="/js/auth.js"></script>
<script>requireCustomer();</script>

<!-- ✅ CUSTOMER NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/index.html">🎂 Elegant Bakery</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" id="cust-nav-home" href="/index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" id="cust-nav-cakes" href="/cake-list.html">Our Cakes</a></li>
                <li class="nav-item"><a class="nav-link active-page" id="cust-nav-order" href="/place-order.html">Place Order</a></li>
                <li class="nav-item"><a class="nav-link" id="cust-nav-booking" href="/booking-form.html">Book Custom Cake</a></li>
                <li class="nav-item"><a class="nav-link" id="cust-nav-reviews" href="/review-form.html">Reviews</a></li>
                <li class="nav-item ms-lg-3">
                    <a class="nav-link nav-logout" id="cust-nav-logout"
                       href="#" onclick="logoutCustomer(); return false;">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-5 mb-5 flex-grow-1">
    <h2 class="mb-4 text-center">Place New Order</h2>

    <div id="orderMessage" class="alert d-none mx-auto" style="max-width:600px;"></div>

    <div class="card mx-auto p-4" style="max-width:600px;">
        <div class="card-body">
            <form id="placeOrderForm" onsubmit="submitOrder(event)">
                <div class="mb-3">
                    <label for="customerId">Customer ID</label>
                    <input type="text" class="form-control" id="customerId" required readonly
                           style="background:#f9f5eb;">
                    <small class="text-muted">Auto-filled from your account.</small>
                </div>
                <div class="mb-3">
                    <label for="cakeId">Cake ID</label>
                    <input type="text" class="form-control" id="cakeId" required
                           placeholder="Enter Cake ID or pick from Our Cakes page">
                </div>
                <div class="mb-3">
                    <label for="totalAmount">Total Amount ($)</label>
                    <input type="number" step="0.01" class="form-control" id="totalAmount" required
                           placeholder="0.00">
                </div>
                <div class="mb-4">
                    <label for="status">Status</label>
                    <select class="form-select" id="status">
                        <option value="PENDING">Pending</option>
                        <option value="COMPLETED">Completed</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                </div>
                <button type="submit" class="btn w-100">Submit Order</button>
            </form>
            <div class="text-center mt-3">
                <a href="/cake-list.html" style="color:var(--gold-accent);text-decoration:none;">← Browse Cakes</a>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    <div class="container">
        <p class="mb-0">Bakery Order &amp; Custom Cake Booking Platform | SE1020 OOP Project | Group WD087</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Pre-fill customer ID and cake ID from URL/localStorage
    document.addEventListener('DOMContentLoaded', () => {
        const custId = localStorage.getItem('customerId') || '';
        document.getElementById('customerId').value = custId;

        const params = new URLSearchParams(window.location.search);
        const cakeId = params.get('cakeId');
        if (cakeId) document.getElementById('cakeId').value = cakeId;
    });

    async function submitOrder(e) {
        e.preventDefault();
        const msgBox = document.getElementById('orderMessage');
        const body = {
            customerId:  document.getElementById('customerId').value,
            cakeId:      document.getElementById('cakeId').value,
            totalAmount: parseFloat(document.getElementById('totalAmount').value),
            status:      document.getElementById('status').value
        };
        try {
            const res = await fetch('/api/orders', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(body)
            });
            if (res.ok) {
                msgBox.className = 'alert alert-success mx-auto d-block';
                msgBox.style.maxWidth = '600px';
                msgBox.innerText = '✅ Order placed successfully!';
                document.getElementById('placeOrderForm').reset();
                document.getElementById('customerId').value = localStorage.getItem('customerId') || '';
            } else {
                msgBox.className = 'alert alert-danger mx-auto d-block';
                msgBox.style.maxWidth = '600px';
                msgBox.innerText = '❌ Failed to place order. Please check your details.';
            }
        } catch (err) {
            msgBox.className = 'alert alert-danger mx-auto d-block';
            msgBox.style.maxWidth = '600px';
            msgBox.innerText = '❌ Cannot connect to server.';
            console.error(err);
        }
    }
</script>
</body>
</html>
