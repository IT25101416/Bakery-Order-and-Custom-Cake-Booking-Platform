<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="logo">Sweet Crumbs Bakery</div>
    <div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/list">Admin List</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="form-container">
    <h2>Admin Registration</h2>

    <form th:action="@{/admin/register}" th:object="${admin}"
          method="post">
        <input type="text" th:field="*{id}" placeholder="Admin ID"
               required>

        <input type="text" th:field="*{name}" placeholder="Admin Name"
               required>

        <input type="email" th:field="*{email}" placeholder="Email Address"
               required>

        <input type="password" th:field="*{password}"
               placeholder="Password" required>

        <select th:field="*{permissionLevel}" required>
            <option value="">Select Permission</option>
            <option value="Super Admin">Super Admin</option>
            <option value="Manager">Manager</option>
            <option value="Staff">Staff</option>
        </select>

        <button type="submit">Register Admin</button>
    </form>
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
