<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Customer List</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<script th:src="@{/js/script.js}"></script>
<nav class="navbar">
  <div class="logo">Sweet Crumbs Bakery</div>
  <div>
    <a href="/">Home</a><a href="/customers/register">Add Customer</a>
    <a href="/admin/dashboard">Admin Dashboard</a>
  </div>
</nav>
<div class="table-container">
  <h2>Customer List</h2>
  <input type="text" id="tableSearch" placeholder="Search here..."
         class="search-box">
  <table>
    <tr>
      <th>Customer ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Actions</th>
    </tr>
    <tr th:each="customer : ${customers}">
      <td th:text="${customer.id}"></td>
      <td th:text="${customer.name}"></td>
      <td th:text="${customer.email}"></td>
      <td th:text="${customer.phone}"></td>
      <td>
        <a th:href="@{/customers/edit/{id}(id=${customer.id})}"
           class="action-btn edit">Edit</a>
        <a th:href="@{/customers/delete/{id}(id=${customer.id})}"
           class="action-btn delete">Delete</a>
      </td>
    </tr>
  </table>
</div>
</body>
</html>
