<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<script th:src="@{/js/script.js}"></script>

<nav class="navbar">
    <div class="logo">Sweet Crumbs Bakery</div>
    <div>
        <a href="/">Home</a>
        <a href="/login">Login</a>
    </div>
</nav>

<div class="form-container">
    <h2>Customer Registration</h2>
    <form th:action="@{/customers/register}" th:object="${customer}" method="post">
        <input type="text" th:field="*{name}" placeholder="Full Name" required>
        <input type="email" th:field="*{email}" placeholder="Email Address" required>
        <input type="password" th:field="*{password}" placeholder="Password" required>
        <input type="text" th:field="*{phone}" placeholder="Phone Number" required>
        <button type="submit">Register</button>
    </form>
    <p class="form-text">
        Already have an account? <a href="/login">Login here</a>
    </p>
</div>
</body>
</html>
