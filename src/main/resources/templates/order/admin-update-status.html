<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Order Status</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<script th:src="@{/js/script.js}"></script>

<nav class="shop-navbar">
    <div class="shop-logo">Sweet Crumbs</div>
    <div class="shop-menu">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/orders/list">Order List</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="form-container">
    <h2>Update Order Status</h2>

    <div th:if="${order == null}" class="status-message error-box">
        Order not found.
    </div>

    <form th:if="${order != null}" th:action="@{/orders/status}" method="post">
        <label>Order ID</label>
        <input type="text" name="orderId" th:value="${order.orderId}" readonly>

        <label>Customer</label>
        <input type="text" th:value="${order.customerName}" readonly>

        <label>Cake</label>
        <input type="text" th:value="${order.cakeName}" readonly>

        <label>Status</label>
        <select name="status">
            <option value="Pending" th:selected="${order.status == 'Pending'}">Pending</option>
            <option value="Preparing" th:selected="${order.status == 'Preparing'}">Preparing</option>
            <option value="Ready" th:selected="${order.status == 'Ready'}">Ready</option>
            <option value="Delivered" th:selected="${order.status == 'Delivered'}">Delivered</option>
            <option value="Cancelled" th:selected="${order.status == 'Cancelled'}">Cancelled</option>
        </select>

        <button type="submit">Update Status</button>
    </form>
</div>

</body>
</html>
