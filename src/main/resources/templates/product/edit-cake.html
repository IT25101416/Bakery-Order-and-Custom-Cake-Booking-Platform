<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Cake</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<script th:src="@{/js/script.js}"></script>

<div class="form-container">
    <h2>Edit Cake</h2>

    <form th:action="@{/products/update}" th:object="${cake}" method="post">
        <input type="text" th:field="*{cakeId}" readonly>
        <input type="text" th:field="*{cakeName}" required>
        <input type="text" th:field="*{category}" required>
        <input type="number" step="0.01" th:field="*{price}" required>
        <input type="number" th:field="*{quantity}" required>

        <button type="submit">Update Cake</button>
    </form>
</div>

</body>
</html>
