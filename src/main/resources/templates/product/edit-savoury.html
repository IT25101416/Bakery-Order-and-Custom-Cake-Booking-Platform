<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Savoury</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<script th:src="@{/js/script.js}"></script>

<div class="form-container">
    <h2>Edit Savoury</h2>
    <form th:action="@{/savouries/update}" th:object="${savoury}" method="post">
        <input type="text" th:field="*{savouryId}" readonly>
        <input type="text" th:field="*{savouryName}" placeholder="Savoury Name" required>
        <input type="text" th:field="*{category}" placeholder="Category" required>
        <input type="number" step="0.01" th:field="*{price}" placeholder="Price" required>
        <input type="number" th:field="*{quantity}" placeholder="Quantity" min="0" required>
        <button type="submit">Update Savoury</button>
    </form>
</div>

</body>
</html>
