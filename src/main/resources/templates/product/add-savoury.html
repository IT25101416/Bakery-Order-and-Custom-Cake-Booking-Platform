<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Savoury</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<script th:src="@{/js/script.js}"></script>

<nav class="navbar">
    <div class="logo">Sweet Crumbs Bakery</div>
    <div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/items">Items</a>
        <a href="/savouries/list">Savoury List</a>
    </div>
</nav>

<div class="form-container">
    <h2>Add Savoury</h2>
    <form th:action="@{/savouries/add}" th:object="${savoury}" method="post">
        <input type="text" th:field="*{savouryId}" placeholder="Savoury ID (optional)">
        <input type="text" th:field="*{savouryName}" placeholder="Savoury Name" required>
        <input type="text" th:field="*{category}" placeholder="Category" required>
        <input type="number" step="0.01" th:field="*{price}" placeholder="Price" required>
        <input type="number" th:field="*{quantity}" placeholder="Quantity" min="0" required>
        <button type="submit">Add Savoury</button>
    </form>
</div>

</body>
</html>
